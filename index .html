<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Analytics Pro | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-animation {
            position: fixed;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: shift 20s linear infinite;
            opacity: 0.3;
        }

        @keyframes shift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-50px, -50px); }
        }

        .login-container {
            width: 100%;
            max-width: 460px;
            padding: 2.5rem;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 1;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-area {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            font-size: 3.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        h2 {
            color: #333;
            font-weight: 700;
            font-size: 1.8rem;
        }

        .subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            color: #555;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .input-field {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 1rem;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }

        .input-field:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 1rem;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .demo-hint {
            text-align: center;
            margin-top: 1.5rem;
            padding: 1rem;
            background: #f5f5f5;
            border-radius: 1rem;
            font-size: 0.85rem;
            color: #666;
        }

        .demo-hint strong {
            color: #667eea;
        }

        .error-msg {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: 1rem;
            text-align: center;
            display: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="login-container">
        <div class="logo-area">
            <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
            <h2>Analytics Pro</h2>
            <div class="subtitle">Enterprise IBM Cognos Dashboard</div>
        </div>
        <form id="loginForm">
            <div class="input-group">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" id="username" class="input-field" placeholder="admin@cognos" autocomplete="off">
            </div>
            <div class="input-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" class="input-field" placeholder="••••••••">
            </div>
            <button type="submit" id="loginBtn" class="btn-login">
                <span id="loginText">Sign In</span>
            </button>
            <div class="demo-hint">
                <i class="fas fa-info-circle"></i> Demo Credentials: <strong>admin@cognos</strong> / <strong>any password</strong><br>
                Or use any email and password
            </div>
            <div id="errorMsg" class="error-msg"></div>
        </form>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const loginText = document.getElementById('loginText');
        const errorMsg = document.getElementById('errorMsg');

        // Simple authentication
        function authenticate(username, password) {
            if (!username || !password) return false;
            username = username.trim();
            password = password.trim();
            
            // Accept any non-empty credentials for demo
            if (username.length >= 3 && password.length >= 1) {
                return { success: true, displayName: username.split('@')[0] };
            }
            return false;
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = usernameInput.value;
            const password = passwordInput.value;
            
            // Show loading state
            loginText.innerHTML = '<span class="loading"></span> Authenticating...';
            loginBtn.disabled = true;
            errorMsg.style.display = 'none';
            
            // Simulate network delay
            setTimeout(() => {
                const authResult = authenticate(username, password);
                
                if (authResult && authResult.success) {
                    // Store user session
                    const userData = {
                        username: username,
                        displayName: authResult.displayName,
                        loginTime: new Date().toISOString()
                    };
                    localStorage.setItem('cognos_user', JSON.stringify(userData));
                    localStorage.setItem('cognos_auth', 'true');
                    
                    // Redirect to dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    errorMsg.textContent = 'Invalid credentials. Please try again.';
                    errorMsg.style.display = 'block';
                    loginText.innerHTML = 'Sign In';
                    loginBtn.disabled = false;
                }
            }, 800);
        });

        // Check if already logged in
        if (localStorage.getItem('cognos_auth') === 'true') {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
